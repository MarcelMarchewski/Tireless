<!DOCTYPE html>

<html>
    <head>
        <title>
            Tireless
        </title>

        <!-- Renders small icon for site tab --->
        <link rel="icon" type="image/x-icon" href="resources/favicon.png">

        <!-- Load CSS + Main script --->
        <link rel="stylesheet" href="resources/main.css">
        <script src="source/tireless/tireless.js" type="module" defer="body"></script>
    </head>

    <body>
        <button id="playButton">
            PLAY
        </button>

        <!-- Left side of the screen displays save management menu --->

        <div id="leftSideBar" style="display: none;">
            <div id="barBackground">
                <br>
                
                <h1>
                    MENU
                </h1>

                <div id="barCentre">
                    <button class="menuButton" id="saveButton">SAVE</button>

                    <br>

                    <input accept=".json" type="file" id="loadInput"> 

                    <button class="menuButton" id="loadButton">LOAD</button>
                </div>
            </div>
        </div>

        <!-- Right side of the screen displays keybinds for each input type --->

        <div id="rightSideBar" style="display: none">
            <div id="barBackground">
                <br>
                
                <h1>
                    CONTROLS
                </h1>

                <h2>
                    KEYBOARD/MOUSE
                </h2>

                <p>
                    MOVEMENT: W-A-S-D
                    <br><br>
                    AIMING: MOUSE
                    <br><br>
                    DASH: SPACE
                    <br><br>
                    BLOCK/PARRY: RMB
                    <br><br>
                    SWING SWORD: LMB
                    <br><br>
                    SHOOT GUN: LEFT-SHIFT
                </p>

                <h2>
                    CONTROLLER (DUALSENSE)
                </h2>

                <p>
                    MOVEMENT: LEFT-JOYSTICK
                    <br><br>
                    AIMING: RIGHT-JOYSTICK
                    <br><br>
                    DASH: L1
                    <br><br>
                    BLOCK/PARRY: L2
                    <br><br>
                    SWING SWORD: R2
                    <br><br>
                    SHOOT GUN: R1
                </p>
            </div>
        </div>
    </body>
</html>
